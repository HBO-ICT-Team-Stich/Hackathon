<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="styling_files/profile_style.css">
    <link rel="stylesheet" href="styling_files/footer_style.css">
    <link rel="stylesheet" href="styling_files/navbar_style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cascadia+Code:ital,wght@0,200..700;1,200..700&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <main>
    <section class="profile-background-section" aria-label="Profile background">
        <nav class="navbar">
            <div class="navbar-div">
          <a class="back-button" href="index.html" aria-label="Terug">
            <svg class="back-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14.5 5.5L8 12l6.5 6.5" />
            </svg>
          </a>
          <h1 class="navbar-title">Profile</h1>
          <img class="navbar-logo" src="images/windesheim_logo.png" alt="Windesheim"/>
            </div>
      </nav>

      <div class="profile-container">
        <div class="profile-picture">
          <img src="images/profile_picture.png" alt="Profile Picture" class="profile-image">
          <button class="profile-settings" aria-label="Profiel instellingen">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19.14 12.94c.04-.31.06-.62.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.47 7.47 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.49-.42h-3.84a.5.5 0 0 0-.49.42l-.36 2.54c-.58.22-1.13.53-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.68 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.62-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.49.41 1.04.72 1.62.94l.36 2.54a.5.5 0 0 0 .49.42h3.84a.5.5 0 0 0 .49-.42l.36-2.54c.58-.22 1.13-.53 1.62-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58z"/>
            <circle cx="12" cy="12" r="3.2"/>
          </svg>
          </button>
        </div>
        <h2 class="profile-name">Naam</h2>
      </div>

        <div class="profile-container-top" role="group" aria-label="Profiel opties">
          <button class="Profile-Button"><span class="button-icon-left">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3.5" y="11" width="17" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
          </span>Wachtwoord wijzigen</button>
          <button class="Profile-Button"><span class="button-icon-left">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 20h4"/><path d="M12 3a5 5 0 0 1 5 5v4.3l1.5 2.6a1 1 0 0 1-.87 1.5H6.37a1 1 0 0 1-.87-1.5L7 12.3V8a5 5 0 0 1 5-5z"/></svg>
          </span>Notificaties</button>
          <button class="Profile-Button"><span class="button-icon-left">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="3.5"/><path d="M5 20a7 7 0 0 1 14 0"/></svg>
          </span>Privacy</button>
          <button class="Profile-Button"><span class="button-icon-left">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="8"/><path d="M9.4 9.4a3.7 3.7 0 0 1 5.6 3.2c0 2-2 2.4-2 4"/><circle cx="12" cy="17.4" r=".8"/></svg>
          </span>Help</button>
        </div>
        <div class="profile-container-bottom" role="group" aria-label="App opties">
          <button class="Profile-Button"><span class="button-icon-left">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v16"/><path d="M4 8h16"/><path d="M8.8 20v-6.5"/><path d="M15.2 20v-6.5"/></svg>
          </span>Toegankelijkheid</button>
          <button class="Profile-Button"><span class="button-icon-left">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.8v2.4"/><path d="M12 18.8v2.4"/><path d="M2.8 12h2.4"/><path d="M18.8 12h2.4"/><path d="m5.5 5.5 1.7 1.7"/><path d="m16.8 16.8 1.7 1.7"/><path d="m18.5 5.5-1.7 1.7"/><path d="m7.2 16.8-1.7 1.7"/></svg>
          </span>Display</button>
          <button class="Profile-Button"><span class="button-icon-left">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s6-5.4 6-10a6 6 0 1 0-12 0c0 4.6 6 10 6 10z"/><circle cx="12" cy="11" r="2.2"/></svg>
          </span>Locatie</button>
          <button class="Profile-Button"><span class="button-icon-left">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m4 7 8 6 8-6"/></svg>
          </span>Contact</button>
        </div>
        <footer class="footer">
            <div class="Footer-div">
                <a class="nav-button Home-button" href="index.html" aria-label="Home">
                    <img class="button-icon" src="images/home.svg" alt="Home" />
                </a>
                <a class="nav-button Map-button" href="map.html" aria-label="Map">
                    <img class="button-icon" src="images/map.svg" alt="Map" />
                </a>
                <a class="nav-button Profile-button" href="profile.html" aria-label="Profile">
                    <img class="button-icon" src="images/profile.svg" alt="Profile" />
                </a>
                <a class="nav-button Notification-button" href="notification.html" aria-label="Notification">
                    <img class="button-icon" src="images/bell.svg" alt="Notification" />
                </a>
            </div>
        </footer>
    </section>
  </main>
</body>
</html>
