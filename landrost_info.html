<!DOCTYPE html>
<html lang="nl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Landrost Info</title>
	<link rel="stylesheet" href="styling_files/navbar_style.css">
	<link rel="stylesheet" href="styling_files/footer_style.css">
	<link rel="stylesheet" href="styling_files/landrost_info_style.css">
	<link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
</head>
<body>
<main>
	<section class="landrost-page" aria-label="Landrost informatie">
		<nav class="navbar">
			<div class="navbar-div">
				<a class="back-button" href="index.html" aria-label="Terug">
					<svg class="back-icon" viewBox="0 0 24 24" aria-hidden="true">
						<path d="M14.5 5.5L8 12l6.5 6.5" />
					</svg>
				</a>
				<h1 class="navbar-title">Gebouw</h1>
				<img class="navbar-logo" src="images/windesheim_logo.png" alt="Windesheim">
			</div>
		</nav>

		<section class="info-content" aria-label="Landrost details">
			<article class="building-card" aria-label="Landrost gebouwkaart">
				<img class="building-image" src="images/Het_landrost_gebouw.jpg" alt="Landrost gebouw">
				<div class="location-badge">
					<img src="images/location_on.svg" alt="" aria-hidden="true">
					<span>Hospitaaldreef 5</span>
				</div>
			</article>

			<article class="description-card" aria-label="Beschrijving">
				<h2>Beschrijving</h2>
				<p>
					De Landrost is een moderne leslocatie van Windesheim in Almere met ruime lokalen,
					studieplekken en goede bereikbaarheid. Het gebouw wordt gebruikt voor onderwijs,
					projectwerk en samenwerking tussen studenten.
				</p>
			</article>

			<section class="route-section" aria-label="Route">
				<h2>Route</h2>
				<a class="route-map-link" href="https://maps.app.goo.gl/C8hWgEnm7m7fqA7L6" target="_blank" rel="noopener noreferrer" aria-label="Open route in Google Maps">
					<div class="route-map-card">
						<img src="images/landrostmaps.png" alt="Kaart van Windesheim Almere locatie Landrost">
					</div>
				</a>
			</section>
		</section>

		<footer class="footer">
			<div class="Footer-div">
				<a class="nav-button Home-button" href="index.html" aria-label="Home">
					<img class="button-icon" src="images/home.svg" alt="Home">
				</a>
				<a class="nav-button Map-button" href="map.html" aria-label="Map">
					<img class="button-icon" src="images/map.svg" alt="Map">
				</a>
				<a class="nav-button Profile-button" href="profile.html" aria-label="Profile">
					<img class="button-icon" src="images/profile.svg" alt="Profile">
				</a>
				<a class="nav-button Notification-button" href="notification.html" aria-label="Notification">
					<img class="button-icon" src="images/bell.svg" alt="Notification">
				</a>
			</div>
		</footer>
	</section>
</main>
</body>
</html>
