<!DOCTYPE html>
<html lang="nl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Taal</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="styling_files/talen_style.css">
</head>
<body>
	<main class="language-page">
		<section class="language-card" aria-label="Taal selectie">
			<a class="back-button" href="inlog.html" aria-label="Terug naar inloggen">
				<svg viewBox="0 0 24 24" aria-hidden="true">
					<path d="M14.5 4.5 7 12l7.5 7.5" />
				</svg>
			</a>

			<header class="language-header">
				<img class="language-icon" src="images/Globe.svg" alt="" aria-hidden="true">
				<h1>Taal</h1>
			</header>

			<div class="language-list" role="list" aria-label="Beschikbare talen">
				<button class="language-option" type="button" role="listitem">Nederlands</button>
				<button class="language-option" type="button" role="listitem">English</button>
				<button class="language-option" type="button" role="listitem">Espanol</button>
				<button class="language-option" type="button" role="listitem">Português</button>
				<button class="language-option" type="button" role="listitem">日本語</button>
				<button class="language-option" type="button" role="listitem">中文</button>
			</div>
		</section>
	</main>

</html>
