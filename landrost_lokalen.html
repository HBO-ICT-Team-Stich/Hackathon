<!DOCTYPE html>
<html lang="nl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Landrost Lokalen</title>
	<link rel="stylesheet" href="styling_files/navbar_style.css">
	<link rel="stylesheet" href="styling_files/footer_style.css">
	<link rel="stylesheet" href="styling_files/landrost_lokalen_style.css">
	<link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
</head>
<body>
<main>
	<section class="lokalen-page" aria-label="Landrost lokalen">
		<nav class="navbar">
			<div class="navbar-div">
				<a class="back-button" href="landrost_verdieping_1-5.html" aria-label="Terug">
					<svg class="back-icon" viewBox="0 0 24 24" aria-hidden="true">
						<path d="M14.5 5.5L8 12l6.5 6.5" />
					</svg>
				</a>
				<h1 class="navbar-title">Lokaal</h1>
				<img class="navbar-logo" src="images/windesheim_logo.png" alt="Windesheim">
			</div>
		</nav>

		<section class="lokalen-content" aria-label="Route plannen lokalen">
			<div class="route-selectors" aria-label="Start en doel">
				<button class="selector-pill" type="button">Start</button>
				<span class="selector-arrow" aria-hidden="true">→</span>
				<button class="selector-pill" type="button">Doel</button>
			</div>

			<div class="lokalen-grid" aria-label="Beschikbare lokalen">
				<button class="lokaal-button" type="button">AL1.22</button>
				<button class="lokaal-button" type="button">AL1.23</button>
				<button class="lokaal-button" type="button">AL1.24</button>
				<button class="lokaal-button" type="button">AL1.18</button>
				<button class="lokaal-button" type="button">AL1.20</button>
				<button class="lokaal-button" type="button">AL1.22</button>
				<button class="lokaal-button" type="button">AL1.24</button>
				<button class="lokaal-button" type="button">AL1.73</button>
				<button class="lokaal-button" type="button">AL1.92</button>
			</div>

			<button class="plan-route-button" type="button">Plan Route</button>

			<div class="bottom-tools" aria-label="Navigatie hulp">
          <div class="slider-indicator" role="img" aria-label="Pagina 1 van 4">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot dot-active"></span>
            <span class="dot"></span>
          </div>

          <button class="help-fab" type="button" aria-label="Help">
            <img src="images/Help circle.svg" alt="" aria-hidden="true">
          </button>
        </div>
		</section>

		<footer class="footer">
			<div class="Footer-div">
				<a class="nav-button Home-button" href="index.html" aria-label="Home">
					<img class="button-icon" src="images/home.svg" alt="Home">
				</a>
				<a class="nav-button Map-button" href="route.html" aria-label="Map">
					<img class="button-icon" src="images/map.svg" alt="Map">
				</a>
				<a class="nav-button Profile-button" href="profile.html" aria-label="Profile">
					<img class="button-icon" src="images/profile.svg" alt="Profile">
				</a>
				<a class="nav-button Notification-button" href="notification.html" aria-label="Notification">
					<img class="button-icon" src="images/bell.svg" alt="Notification">
				</a>
			</div>
		</footer>
	</section>
</main>
</body>
</html>
