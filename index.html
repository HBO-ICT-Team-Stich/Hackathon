<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styling_files/index_style.css">
    <link rel="stylesheet" href="styling_files/footer_style.css">
    <link rel="stylesheet" href="styling_files/navbar_style.css">
    <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
</head>
<body>
  <main>
    <section class="background-section" aria-label="Dashboard background">
        <nav class="navbar">
            <div class="navbar-div">
                <a class="back-button" href="inlog.html" aria-label="Terug">
                    <svg class="back-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M14.5 5.5L8 12l6.5 6.5" />
                    </svg>
                </a>
                <h1 class="navbar-title">Dashboard</h1>
                <img class="navbar-logo" src="images/windesheim_logo.png" alt="Windesheim" />
            </div>
        </nav>

        <div class="top-content-row" aria-label="Snelle acties en recente notificaties">
            <a class="map-button" href="route.html" aria-label="Open plattegrond">
                <img class="map-button-icon" src="images/map.svg" alt="" aria-hidden="true" />
                <p class="map-button-label">Plattegrond</p>
            </a>

            <div class="recent-notifications">
                <h3>Notificaties</h3>
                <div class="notifications-container">
                    <div class="notification-item">
                        <p class="notification-title">Fietsen gestolen</p>
                    </div>
                    <div class="notification-item">
                        <p class="notification-title">Onderhoud</p>
                    </div>
                </div>
                <a class="view-notifications" href="notification.html" aria-label="Bekijk alle notificaties">
                    <img class="view-notifications-icon" src="images/bell.svg" alt="" aria-hidden="true" />
                </a>
            </div>
        </div>

        <div class="recent-route">
            <div class="content-label">
                <h3>Recent</h3>
            </div>
            <div class="route-container">
                <h3>AL1.08</h3>
                <img class="route-icon" src="images/arrow_directional_right.png" alt="Route" />
                <h3>AL1.22</h3>
            </div>
        </div>

        <div class="change-route">
            <div class="change-route-container">
                <h3>Route aanpassen</h3>
                <a class="change-button change-building" href="building.html" aria-label="Verander gebouw">
                    Gebouw
                </a>
                <a class="change-button change-floor" href="circus_verdiepingen.html" aria-label="Verander verdieping">
                    Verdieping
                </a>
                <a class="change-button change-room" href="circus_lokalen.html" aria-label="Verander lokaal">
                    Lokaal
                </a>
                <a class="start-button start-route" href="route.html" aria-label="Start route">
                    Gaan
                </a>
            </div>
        </div>

        <footer class="footer">
            <div class="Footer-div">
                <a class="nav-button Home-button" href="index.html" aria-label="Home">
                    <img class="button-icon" src="images/home.svg" alt="Home" />
                </a>
                <a class="nav-button Map-button" href="route.html" aria-label="Map">
                    <img class="button-icon" src="images/map.svg" alt="Map" />
                </a>
                <a class="nav-button Profile-button" href="profile.html" aria-label="Profile">
                    <img class="button-icon" src="images/profile.svg" alt="Profile" />
                </a>
                <a class="nav-button Notification-button" href="notification.html" aria-label="Notification">
                    <img class="button-icon" src="images/bell.svg" alt="Notification" />
                </a>
            </div>
        </footer>
    </section>
  </main>
</body>
</html>
