<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="styling_files/description_style.css">
    <link rel="stylesheet" href="styling_files/footer_style.css">
    <link rel="stylesheet" href="styling_files/navbar_style.css">
    <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
</head>
<body>
  <main>
    <section class="background-section" aria-label="Description background">
        <nav class="navbar">
            <div class="navbar-div">
                <a class="back-button" href="index.html" aria-label="Terug">
                    <svg class="back-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M14.5 5.5L8 12l6.5 6.5" />
                    </svg>
                </a>
                <h1 class="navbar-title">Gebouw</h1>
                <img class="navbar-logo" src="images/windesheim_logo.png" alt="Windesheim" />
            </div>
        </nav>

        <div class="location-content">
            <div class="image-card">
                <img class="location-image" src="images/landdrost_gebouw.jpg" alt="Gebouw" />
                <div class="image-content">
                    <img class="location-icon" src="images/map_pointer.png" alt="Location" />
                    <p>Hospitaaldreef 5</p>
                </div>
            </div>
        </div>

        <div class="description-content">
            <h1 class="description-title">Beschrijving</h1>
            <p class="description-text">Lorem ipsum dolor, sit amet consectetur adipisicing elit. A repudiandae, omnis commodi delectus veritatis vero atque consequuntur facilis natus aut laborum praesentium? Similique doloremque laudantium sed vero ipsam, quisquam blanditiis.</p>
        </div>

        <div class="route-content">
            <h1 class="route-title">Route</h1>
            <img class="route-image" src="images/description_route.png" alt="Route" />
        </div>

        <footer class="footer">
            <div class="Footer-div">
                <a class="nav-button Home-button" href="index.html" aria-label="Home">
                    <img class="button-icon" src="images/home.svg" alt="Home" />
                </a>
                <a class="nav-button Map-button" href="route.html" aria-label="Map">
                    <img class="button-icon" src="images/map.svg" alt="Map" />
                </a>
                <a class="nav-button Profile-button" href="profile.html" aria-label="Profile">
                    <img class="button-icon" src="images/profile.svg" alt="Profile" />
                </a>
                <a class="nav-button Notification-button" href="notification.html" aria-label="Notification">
                    <img class="button-icon" src="images/bell.svg" alt="Notification" />
                </a>
            </div>
        </footer>
    </section>
  </main>
</body>
</html>
