<!DOCTYPE html>
<html lang="nl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Route</title>
	<link rel="stylesheet" href="styling_files/route_style.css">
	<link rel="stylesheet" href="styling_files/footer_style.css">
	<link rel="stylesheet" href="styling_files/navbar_style.css">
	<link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
</head>
<body>
<main>
	<section class="route-page" aria-label="Route scherm">
		<nav class="navbar">
			<div class="navbar-div">
				<a class="back-button" href="landrost_lokalen.html" aria-label="Terug">
					<svg class="back-icon" viewBox="0 0 24 24" aria-hidden="true">
						<path d="M14.5 5.5L8 12l6.5 6.5" />
					</svg>
				</a>
				<h1 class="navbar-title">Route</h1>
				<img class="navbar-logo" src="images/windesheim_logo.png" alt="Windesheim">
			</div>
		</nav>

		<section class="route-content" aria-label="Route kaart">
			<div class="map-board">
				<img class="map-base" src="images/plattegrond.png" alt="Plattegrond van de verdieping">

				<div class="instruction-card">
					<span>Blijf rechtdoor lopen</span>
					<strong>↑</strong>
				</div>

				<div class="room-pill room-pill-top">AC1.08</div>
				<div class="room-pill room-pill-bottom">AC1.24</div>
				<div class="lift-bubble">⇩</div>

				<div class="route-line route-line-h1"></div>
				<div class="route-line route-line-v1"></div>
				<div class="route-line route-line-h2"></div>
				<div class="route-line route-line-v2"></div>

				<div class="route-turn-point" aria-hidden="true"></div>
				<div class="route-alert">!</div>
				<div class="route-start">A</div>
				<div class="route-end">A</div>

				<div class="steps-sheet" aria-label="Stappen">
					<h2>Stappen</h2>
				</div>

				<button class="accessibility-fab" type="button" aria-label="Toegankelijkheid">
					<img src="images/rolstoel.svg" alt="" aria-hidden="true">
				</button>
			</div>
		</section>

		<footer class="footer">
			<div class="Footer-div">
				<a class="nav-button Home-button" href="index.html" aria-label="Home">
					<img class="button-icon" src="images/home.svg" alt="Home">
				</a>
				<a class="nav-button Map-button" href="map.html" aria-label="Map">
					<img class="button-icon" src="images/map.svg" alt="Map">
				</a>
				<a class="nav-button Profile-button" href="profile.html" aria-label="Profile">
					<img class="button-icon" src="images/profile.svg" alt="Profile">
				</a>
				<a class="nav-button Notification-button" href="notification.html" aria-label="Notification">
					<img class="button-icon" src="images/bell.svg" alt="Notification">
				</a>
			</div>
		</footer>
	</section>
</main>
</body>
</html>
