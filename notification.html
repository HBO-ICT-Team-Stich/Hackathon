<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificaties</title>
    <link rel="stylesheet" href="styling_files/notification_style.css">
    <link rel="stylesheet" href="styling_files/footer_style.css">
    <link rel="stylesheet" href="styling_files/navbar_style.css">
    <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
</head>
<body>
  <main>
    <section class="notification-background-section" aria-label="Notification background">
        <nav class="navbar">
            <div class="navbar-div">
                <a class="back-button" href="index.html" aria-label="Terug">
                    <svg class="back-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M14.5 5.5L8 12l6.5 6.5" />
                    </svg>
                </a>
                <h1 class="navbar-title">Notificaties</h1>
                <img class="navbar-logo" src="images/windesheim_logo.png" alt="Windesheim" />
            </div>
        </nav>
        
        <div class="notification-frame">
            <div class="notification-item">
                <img class="notification-icon" src="images/bell.svg" alt="Waarschuwing" />
                <div class="notification-card">
                    <p class="notification-description">Er is een melding gemaakt van een gestolen fiets bij de fietsenstalling. Wees alert en controleer je fiets regelmatig.</p>
                </div>
            </div>
            <div class="notification-item">
                <img class="notification-icon" src="images/bell.svg" alt="Notificatie" />
                <div class="notification-card">
                    <p class="notification-description">Nick Vinju is ontsnapt uit zijn cel en steelt fietsen! Blijf alert en pas op je omgeving, zodat je jezelf en anderen kunt beschermen tegen de gevaarlijke situatie.</p>
                </div>
            </div>
        </div>
        
        <footer class="footer">
            <div class="Footer-div">
                <a class="nav-button Home-button" href="index.html" aria-label="Home">
                    <img class="button-icon" src="images/home.svg" alt="Home" />
                </a>
                <a class="nav-button Map-button" href="route.html" aria-label="Map">
                    <img class="button-icon" src="images/map.svg" alt="Map" />
                </a>
                <a class="nav-button Profile-button" href="profile.html" aria-label="Profile">
                    <img class="button-icon" src="images/profile.svg" alt="Profile" />
                </a>
                <a class="nav-button Notification-button" href="notification.html" aria-label="Notification">
                    <img class="button-icon" src="images/bell.svg" alt="Notification" />
                </a>
            </div>
        </footer>
    </section>
  </main>
</body>
</html>
