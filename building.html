<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="styling_files/building_style.css">
    <link rel="stylesheet" href="styling_files/footer_style.css">
    <link rel="stylesheet" href="styling_files/navbar_style.css">
    <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
</head>
<body>
  <main>
    <section class="home-background-section" aria-label="Home background">
        <nav class="navbar">
            <div class="navbar-div">
          <a class="back-button" href="inlog.html" aria-label="Terug">
            <svg class="back-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14.5 5.5L8 12l6.5 6.5" />
            </svg>
          </a>
          <h1 class="navbar-title">Gebouw</h1>
          <img class="navbar-logo" src="images/windesheim_logo.png" alt="Windesheim" />
            </div>
      </nav>

      <section class="buildings-content" aria-label="Gebouwen">
        <div class="building-row">
          <a href="landrost_info.html" aria-label="Ga naar Landrost info">
            <img class="building-thumb" src="images/Het_landrost_gebouw.jpg" alt="Landrost gebouw">
          </a>
          <a class="building-button" href="landrost_verdieping_1-5.html" aria-label="Ga naar Landrost verdiepingen 1 tot en met 5">Landdrost</a>
        </div>

        <div class="building-row">
          <a href="circus_info.html" aria-label="Ga naar Circus info">
            <img class="building-thumb" src="images/Het_circus_gebouw.jpg" alt="Circus gebouw">
          </a>
          <a class="building-button" href="circus_verdiepingen.html" aria-label="Ga naar Circus verdiepingen">Circus</a>
        </div>

        <a class="new-building-button" href="nieuw_gebouw.html">Bekijk onze nieuwe gebouw</a>

        <div class="bottom-tools" aria-label="Navigatie hulp">
          <div class="slider-indicator" role="img" aria-label="Pagina 1 van 4">
            <span class="dot dot-active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>

          <a class="help-fab" href="description.html" type="button" aria-label="Help">
            <img src="images/Help circle.svg" alt="" aria-hidden="true">
          </a>
        </div>
      </section>

        <footer class="footer">
            <div class="Footer-div">
                <a class="nav-button Home-button" href="index.html" aria-label="Home">
                    <img class="button-icon" src="images/home.svg" alt="Home" />
                </a>
                <a class="nav-button Map-button" href="route.html" aria-label="Map">
                    <img class="button-icon" src="images/map.svg" alt="Map" />
                </a>
                <a class="nav-button Profile-button" href="profile.html" aria-label="Profile">
                    <img class="button-icon" src="images/profile.svg" alt="Profile" />
                </a>
                <a class="nav-button Notification-button" href="notification.html" aria-label="Notification">
                    <img class="button-icon" src="images/bell.svg" alt="Notification" />
                </a>
            </div>
        </footer>
    </section>
  </main>
</body>
</html>
