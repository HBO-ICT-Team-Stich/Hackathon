<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="styling_files/building_style.css">
    <link rel="stylesheet" href="styling_files/footer_style.css">
    <link rel="stylesheet" href="styling_files/navbar_style.css">
    <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
</head>
<body>
  <main>
    <section class="background-section" aria-label="Description background">
        <nav class="navbar">
            <div class="navbar-div">
                <a class="back-button" href="index.html" aria-label="Terug">
                    <svg class="back-icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M14.5 5.5L8 12l6.5 6.5" />
                    </svg>
                </a>
                <h1 class="navbar-title">Gebouw</h1>
                <img class="navbar-logo" src="images/windesheim_logo.png" alt="Windesheim" />
            </div>
        </nav>

        <div class="building-buttons">
            <div class="building-landdrost">
                <img class="building-image" src="images/landdrost_gebouw.jpg" alt="Gebouw" />
                <button class="building-button" aria-label="Landdrostgebouw">Landdrost</button>
            </div>
            <div class="building-circus">
                <img class="building-image" src="images/circus_gebouw.png" alt="Gebouw" />
                <button class="building-button" aria-label="Circusgebouw">Circus</button>
            </div>
        </div>

        <div class="building-nieuw">
            <button class="building-blueprint-button" aria-label="Open blueprint">Bekijk ons nieuwe gebouw</button>
        </div>

        <div class="progress-frame">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="line"></div>
        </div>

        <button class="question-button" aria-label="Help">
            <img class="question-icon" src="images/help.png" alt="Help" />
        </button>

        <footer class="footer">
            <div class="Footer-div">
                <a class="nav-button Home-button" href="index.html" aria-label="Home">
                    <img class="button-icon" src="images/home.svg" alt="Home" />
                </a>
                <a class="nav-button Map-button" href="map.html" aria-label="Map">
                    <img class="button-icon" src="images/map.svg" alt="Map" />
                </a>
                <a class="nav-button Profile-button" href="profile.html" aria-label="Profile">
                    <img class="button-icon" src="images/profile.svg" alt="Profile" />
                </a>
                <a class="nav-button Notification-button" href="notification.html" aria-label="Notification">
                    <img class="button-icon" src="images/bell.svg" alt="Notification" />
                </a>
            </div>
        </footer>
    </section>
  </main>
</body>
</html>
